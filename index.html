<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>CR7 - 1000 Goals Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <main class="container">
    <section class="card">
      <div class="badge">CR7 Tracker</div>

      <h1>Road to 1000 Goals</h1>
      <p class="subtitle">Tracking Cristiano Ronaldo’s legacy</p>

      <div class="goals-box">
        <div id="goalsNumber" class="goals-number">---</div>
        <div class="goals-label">goals</div>
      </div>

      <div class="progress-area">
        <div class="progress-info">
          <span id="remainingGoals">-- remaining</span>
          <span>Target: 1000</span>
        </div>

        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div id="lastUpdated" class="footer">
        Loading data...
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>

</body>
</html>
